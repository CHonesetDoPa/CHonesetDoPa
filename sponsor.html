<!DOCTYPE html>
<html lang="auto">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="CH's HomePage">
    <meta name="format-detection" content="telephone=no">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.fancybox.js"></script>
    <script src="assets/js/instantpage.js" type="module"></script>
    <script src="assets/js/lazysizes.min.js" async></script>
    <script src="assets/js/sweetalert.min.js"></script>
    <script src="assets/js/sponsorlist.js"></script>
    <!--语言控制器-->
    <script src="assets/js/language-controller.js"></script>
    <!--i18n国际化系统-->
    <script src="assets/js/i18n-config.js"></script>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/i18n-init.js"></script>
    <!--链接管理器-->
    <script src="assets/js/link-manager.js"></script>
    <!--自动夜间模式管理器-->
    <script src="assets/js/dark-mode-manager.js"></script>

    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="assets/css/index.css">
    <link rel="stylesheet" href="assets/css/font-awesome.css">
    <link rel="stylesheet" href="assets/css/jquery.fancybox.css">
    <link rel="stylesheet" href="assets/css/sponsor.css">

    <script src="assets/js/ie-check.js"></script>

    <title data-i18n="site.title">CH's HomePage</title>

</head>

<body>
    <div id="body-wrap">
        <nav class="not_index_bg" id="nav" style="background-image:url(assets/img/BG/bg.webp)">
            <div id="page_site-info">
                <div id="site-title">
                    <span class="blogtitle"></span>
                    <script src="assets/js/typed.min.js"></script>
                    <script src="assets/js/typed-init.js"></script>
                </div>
            </div>
        </nav>
        <main id="content-outer">
            <div class="layout_page" id="content-inner">
                <div class="aside_content" id="aside_content">
                    <div class="card-widget card-info">
                        <div class="card-content">
                            <div class="card-info-avatar is-center">
                                <img class="avatar-img" src="assets/img/V4/V4-Avatar.webp" alt="avatar">
                                <div class="author-info__name">
                                    <span color="pink"><b>CH</b></span>
                                </div>
                                <div class="author-info__description" data-en="Sekai ichi kawaii!" data-zh="世界第一可爱！">
                                    世界第一可爱！</div>
                            </div>
                            <div class="card-info-social-icons is-center">
                                <div id="social-media-icons-placeholder"></div>
                                <br>
                                <button class="dark-button" onclick="dark()" style="vertical-align:middle" title="切换夜间/浅色模式"><span><i
                                            class="fa fa-sun-o"></i> / <i class="fa fa-moon-o"></i></span></button>
                                <button class="dark-button" id="language-switch-btn" onclick="switchLanguage()">English</button>
                            </div>
                        </div>
                    </div>

                    <div class="card-widget card-announcement">
                        <div class="card-content">
                            <div class="item-headline">
                                <i class="fa fa-calendar" aria-hidden="true"></i>
                                <span data-en="Notice" data-zh="公告">公告</span>
                            </div>
                            <div id="">
                                <p data-en="Today,study." data-zh="最近，学习中。">最近，学习中。</p>
                            </div>
                        </div>
                    </div>



                    <div class="card-widget card-webinfo">
                        <div class="card-content">
                            <div class="item-headline">
                                <i class="fa fa-line-chart" aria-hidden="true"></i>
                                <span data-en="Site Info" data-zh="站点信息">站点信息</span>
                            </div>
                            <div class="webinfo">
                                <div class="webinfo-item">
                                    <div class="webinfo-site-name" data-en="Running Status:" data-zh="运行状态："> 运行状态：
                                    </div>
                                    <div class="webinfo-site-pv-count" data-en="🟢 Normal" data-zh="🟢 正常">🟢 正常</div>
                                    <!-- <div class="webinfo-site-pv-count" id="">🟠 卡顿</div> -->
                                    <!-- <div class="webinfo-site-pv-count" id="">🔴 严重错误</div> -->
                                </div>
                                <div class="webinfo-item">
                                    <div class="webinfo-site-name" data-en="My Status:" data-zh="站长状态："> 站长状态：</div>
                                    <div class="webinfo-site-pv-count" data-en="🟢 Still Alive" data-zh="🟢 活着">🟢 活着
                                    </div>
                                </div>
                                <div class="webinfo-item">
                                    <div class="webinfo-site-name" data-en="Services Status:" data-zh="服务运行状态："> 服务运行状态：
                                    </div>
                                    <div class="webinfo-site-pv-count"> <a href="https://kuma.nekoc.cc/status/nya"
                                            data-en="🟢 View" data-zh="🟢 查看">查看</a></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <article id="page">
                    <div class="article-container">

                        <hr>
                        <h2 data-i18n="sponsor.title" style="font-weight: bold;font-size: larger;text-align: center;">Sponsor List</h2>
                        <div class="tool">
                            <table id="sponsor" class="display" cellspacing="0" width="100%">
                                <thead>
                                    <tr>
                                        <th>Sponsor</th>
                                        <th>Price</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>NyaWorks</td>
                                        <td>6 CNY</td>
                                    </tr>
                                    <tr>
                                        <td>CenterReduction</td>
                                        <td>6 CNY</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <hr>

                        <div class="content">
                            <h2 data-i18n="sponsor.chooseMethod" data-en="Choose donation method" data-zh="选择捐赠方式">选择捐赠方式</h2>
                            <blockquote><span class="spon" onclick="sponsor_wechat()" data-en="Sponsor via WechatPay"
                                    data-zh="使用微信赞赏码捐赠">使用微信赞赏码捐赠</span><br></blockquote>
                            <blockquote><span class="spon" onclick="sponsor_patreon()" data-en="Sponsor via Patreon"
                                    data-zh="使用Patreon捐赠">使用Patreon捐赠</span><br></blockquote>
                            <blockquote><span class="spon" onclick="sponsor_afdian()" data-en="Sponsor via Afdian"
                                    data-zh="使用爱发电捐赠">使用爱发电捐赠</span><br></blockquote>
                            <blockquote><span class="spon" onclick="sponsor_opencollective()" data-en="Sponsor via OpenCollective"
                                    data-zh="使用OpenCollective捐赠">使用OpenCollective捐赠</span><br></blockquote>
                        </div>
                    </div>
        </main>
        <footer id="footer">
            <div id="footer-wrap">
                Copyright 2025 CH 每一天都是新的一天
            </div>
        </footer>
    </div>
</body>


<!--鼠标点击效果-->
<script src="assets/js/maodian.js"></script>
<!-- 复制内容 -->
<script src="assets/js/clipboard-utils.js"></script>
<!--捐赠面板现在由 link-manager.js 处理-->    
<!-- 显示邮箱等函数现在由 link-manager.js 处理 -->
<!-- 问候 -->
<script src="assets/js/greeting-system.js"></script>
<script src="assets/js/page-effects.js"></script>

</html>
